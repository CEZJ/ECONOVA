spring:
  application:
    name: midjourney-backend

  # Perfil por defecto: desarrollo con H2
  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

# Configuración JWT
app:
  jwt:
    secret: "${JWT_SECRET}"
    expiration-ms: 7200000  # 2 horas en milisegundos

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

---
# Perfil DESARROLLO (H2 en memoria)
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:midjourneydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=YEAR
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    locations: classpath:db/migration

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none

---
# Perfil PRODUCCIÓN (PostgreSQL)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/midjourney_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:midjourney_user}
    password: ${DB_PASSWORD:midjourney_pass}

  flyway:
    locations: classpath:db/migration

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
